{% extends "base.html" %}
{% load static %}

{% block title %}Login | SJ.Tech{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
    .login-wrapper {
        background: linear-gradient(120deg, #0c0f26, #0b0d22, #040510);
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding-top: 50px;
        padding-bottom: 50px;
    }

    .login-card {
        background: #11152f;
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 480px;
        margin: auto;
        box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
    }

    .login-card h2 {
        color: #fff;
        font-weight: 700;
        margin-bottom: 10px;
        font-size: 32px;
    }

    .login-card p {
        color: #aaa;
        margin-bottom: 25px;
        font-size: 14px;
    }

    .form-label {
        color: #ddd;
        font-weight: 600;
    }

    .form-control, .form-select {
        background: #0c1130;
        border: 1px solid #2a2f52;
        color: #fff;
    }

    .form-control:focus, .form-select:focus {
        box-shadow: 0 0 5px #ff5db1;
        border-color: #ff5db1;
    }

    .btn-login {
        background: #ff5db1;
        border: none;
        padding: 12px;
        width: 100%;
        font-size: 17px;
        font-weight: 600;
        border-radius: 8px;
        transition: 0.3s;
    }

    .btn-login:hover {
        background: #ff2d96;
        color: white;
    }

    .extra-link {
        color: #aaa;
        font-size: 14px;
    }

    .extra-link a {
        color: #ff5db1;
        text-decoration: none;
    }

</style>
{% endblock %}

{% block content %}

<div class="login-wrapper">
    <div class="login-card">
        <h2>Welcome Back!</h2>
        <p>Login to access your dashboard</p>

        <form method="POST" novalidate>
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>

             <!-- Password -->
             <div class="mb-3 position-relative">
                 <label class="form-label">Password</label>

                 <div class="input-group">
                     <input type="password" id="passwordInput" name="password" class="form-control" placeholder="Enter password" required>
                     <span class="input-group-text" id="togglePassword" style="cursor: pointer; background:#0c1130; border:1px solid #2a2f52; height: 44px;">
                         <i class="bi bi-eye-fill text-white" id="eyeIcon"></i>
                     </span>
                 </div>
             </div>

            <!-- Role -->
            <div class="mb-3">
                <label class="form-label">Select Role</label>
                <select name="role" class="form-select" required>
                    <option value="">Choose Role</option>
                    <option value="client">Client</option>
                    <option value="student">Student</option>
                    <option value="employee">Employee</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-login">Login</button>

            <p class="text-center mt-3 extra-link">
                Don't have an account? <a href="{% url 'password_reset' %}">Forgot</a>
            </p>
        </form>
    </div>
</div>

{% endblock %}


{% block extra_script %}
<script>
    const passwordInput = document.getElementById("passwordInput");
    const togglePassword = document.getElementById("togglePassword");
    const eyeIcon = document.getElementById("eyeIcon");

    togglePassword.addEventListener("click", function () {
        const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
        passwordInput.setAttribute("type", type);

        // Change icon
        eyeIcon.classList.toggle("bi-eye-fill");
        eyeIcon.classList.toggle("bi-eye-slash-fill");
    });
</script>
{% endblock %}
