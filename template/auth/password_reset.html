{% extends "base.html" %}
{% load static %}

{% block title %}Forgot Password | SJ.Tech{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
    .login-wrapper {
        background: linear-gradient(120deg, #0c0f26, #0b0d22, #040510);
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding-top: 50px;
        padding-bottom: 50px;
    }

    .login-card {
        background: #11152f;
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 480px;
        margin: auto;
        box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
    }

    .login-card h2 {
        color: #fff;
        font-weight: 700;
        margin-bottom: 10px;
        font-size: 32px;
    }

    .login-card p {
        color: #aaa;
        margin-bottom: 25px;
        font-size: 14px;
    }

    .form-label {
        color: #ddd;
        font-weight: 600;
    }

    .form-control {
        background: #0c1130;
        border: 1px solid #2a2f52;
        color: #fff;
    }

    .btn-login {
        background: #ff5db1;
        border: none;
        padding: 12px;
        width: 100%;
        font-size: 17px;
        font-weight: 600;
        border-radius: 8px;
        margin-top: 10px;
        transition: 0.3s;
    }

    .btn-login:hover {
        background: #ff2d96;
        color: white;
    }

    .extra-link a {
        color: #ff5db1;
        text-decoration: none;
    }
</style>
{% endblock %}

{% block content %}

<div class="login-wrapper">
    <div class="login-card">
        <h2>Forgot Password?</h2>
        <p>Enter your registered email and we will send you a reset link.</p>

        <form method="POST">
            {% csrf_token %}

            <label class="form-label">Email Address</label>
            <input type="email"
                   name="{{ form.email.name }}"
                   class="form-control"
                   placeholder="Enter your email"
                   required />

            <button type="submit" class="btn-login">Send Reset Link</button>

            <p class="text-center mt-3 extra-link">
                Back to <a href="{% url 'login' %}">Login</a>
            </p>
        </form>
    </div>
</div>

{% endblock %}
