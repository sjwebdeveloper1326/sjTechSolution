 {% block extra_css %}
<!-- Blinking Animation -->
<style>
.form-control,
.form-select {
  background-color: #343a40 !important;
  color: #ffffff !important;
  border: 1px solid #6c757d !important;
  border-radius: 0.375rem;
  height: calc(1.5em + 0.75rem + 2px);
  padding: 0.375rem 0.75rem;
  font-size: 1rem;
  line-height: 1.5;
}

.form-select {
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23ffffff' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e") !important;
  background-repeat: no-repeat;
  background-position: right 0.75rem center;
  background-size: 16px 12px;
  padding-right: 2.25rem !important;
}

.form-control:disabled,
.form-select:disabled {
  background-color: #495057 !important;
  color: #adb5bd !important;
  border-color: #6c757d80 !important;
  opacity: 1 !important;
  cursor: not-allowed;
}

.form-control:disabled + input[type="hidden"],
.form-select:disabled + input[type="hidden"] {
}

.form-control:required,
.form-select:required {
  border-left: 3px solid #ff2c91 !important;
}
</style>

{% endblock %}

<div
  class="card bg-dark text-white shadow-lg"
  style="border: 2px solid #ff2c91; border-radius: 15px"
>
  <div class="card-body p-4">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="row g-3">
        <!-- Name -->
        <div class="col-md-6">
  <label class="form-label">Full Name * </label>
  <input
    type="text"
    name="name"
    class="form-control bg-secondary text-white"
    value="{{ emp.name|default:'' }}"
    required
    {% if emp %}disabled{% endif %}
  />
  {% if emp %}
  <input type="hidden" name="name" value="{{ emp.name }}">
  {% endif %}
</div>


        <!-- Phone with mobile validation -->
        <div class="col-md-6">
          <label class="form-label">Phone *</label>
          <input
            type="tel"
            name="phone"
            pattern="[0-9]{10}"
            maxlength="10"
            class="form-control bg-secondary text-white"
            placeholder="10-digit number"
            value="{{ emp.phone }}"
            required
          />
        </div>

        <!-- Email -->
        <!-- Email -->
<div class="col-md-6">
  <label class="form-label">Email *</label>
  <input
    type="email"
    name="email"
    class="form-control bg-secondary text-white"
    value="{{ emp.email|default:'' }}"
    required
    {% if emp %}disabled{% endif %}
  />
  {% if emp %}
  <input type="hidden" name="email" value="{{ emp.email }}">
  {% endif %}
</div>

        <!-- Designation -->
        <div class="col-md-6">
          <label class="form-label">Designation </label>
          <input
            type="text"
            name="designation"
            class="form-control bg-secondary text-white"
            value="{{ emp.designation }}"
          />
        </div>

        <!-- Salary OPTIONAL -->
        <div class="col-md-4">
          <label class="form-label">Salary (Optional)</label>
          <input
            type="number"
            step="0.01"
            name="salary"
            class="form-control bg-secondary text-white"
            value="{{ emp.salary }}"
          />
        </div>

        <!-- Status -->
        <div class="col-md-4">
          <label class="form-label">Status</label>
          <select name="status" class="form-select bg-secondary text-white border border-secondary-subtle" 
        style="height: calc(1.5em + 0.75rem + 2px);">
<option value="active" {% if emp.status == "active" %}selected{% endif %}>Active</option>
<option value="inactive" {% if emp.status == "inactive" %}selected{% endif %}>Inactive</option>
<option value="terminated" {% if emp.status == "terminated" %}selected{% endif %}>Terminated</option>
          </select>
        </div>

        <!-- Gender -->
        <div class="col-md-4">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-select bg-secondary text-white">
           <option value="male" {% if emp.gender == "male" %}selected{% endif %}>Male</option>
<option value="female" {% if emp.gender == "female" %}selected{% endif %}>Female</option>
<option value="other" {% if emp.gender == "other" %}selected{% endif %}>Other</option>
          </select>
        </div>

        <!-- Date of Birth -->
        <div class="col-md-6">
          <label class="form-label">Date of Birth </label>
          <input
            type="date"
            name="dob"
            class="form-control bg-secondary text-white"
            value="{{ emp.dob|date:'Y-m-d' }}"
          />
        </div>

        <!-- Aadhaar -->
        <div class="col-md-6">
          <label class="form-label">Aadhaar (Optional)</label>
          <input
            type="text"
            maxlength="12"
            name="aadhaar"
            class="form-control bg-secondary text-white"
            value="{{ emp.aadhaar }}"
            placeholder="123456789012"
          />
        </div>

        <!-- Address -->
        <div class="col-12">
          <label class="form-label">Address </label>
          <textarea
            name="address"
            class="form-control bg-secondary text-white"
            rows="3"
          >
{{ emp.address }}</textarea
          >
        </div>

        <!-- Date of Joining -->
        <div class="col-md-6">
          <label class="form-label">Date of Joining </label>
          <input
            type="date"
            name="date_of_joining"
            class="form-control bg-secondary text-white"
            value="{{ emp.date_of_joining|date:'Y-m-d' }}"
          />
        </div>

        <!-- State -->
        <div class="col-md-6">
          <label class="form-label">State </label>
          <input
            type="text"
            name="state"
            class="form-control bg-secondary text-white"
            placeholder="Enter state"
            value="{{ emp.state }}"
          />
        </div>

        <!-- City -->
        <div class="col-md-6">
          <label class="form-label">City </label>
          <input
            type="text"
            name="city"
            class="form-control bg-secondary text-white"
            placeholder="Enter city"
            value="{{ emp.city }}"
          />
        </div>

        <!-- Role -->
       <div class="col-md-6">
  <label class="form-label">Role *</label>
  <select name="role" class="form-select bg-secondary text-white" {% if emp %}disabled{% endif %}>
    <option value="client" {% if emp.role == "client" %}selected{% endif %}>Client</option>
    <option value="employee" {% if emp.role == "employee" %}selected{% endif %}>Employee</option>
    <option value="teacher" {% if emp.role == "teacher" %}selected{% endif %}>Teacher</option>
  </select>
  {% if emp %}
  <input type="hidden" name="role" value="{{ emp.role }}">
  {% endif %}
</div>

  
        <!-- Photo -->
<div class="col-12">
  <label class="form-label">Photo</label>
  <input
    type="file"
    name="photo"
    class="form-control bg-secondary text-white mb-3"
    accept="image/*"
  />

  {% if emp.photo %}
  <div class="text-center">
    <img
      src="{{ emp.photo.url }}"
      alt="{{ emp.name }} photo"
      class="img-thumbnail bg-dark border border-secondary-subtle shadow-sm"
      style="
        max-height: 180px;
        width: auto;
        object-fit: cover;
        border-radius: 12px;
        border: 2px solid #6c757d;
      "
    />
    <p class="text-muted mt-2 small">Current photo (click Save to update)</p>
  </div>
  {% else %}
  <div class="text-center p-3 bg-secondary rounded border border-secondary-subtle">
    <p class="text-muted mb-0">No photo uploaded yet</p>
  </div>
  {% endif %}
</div>

        <!-- Submit -->
        <div class="col-12 text-center mt-4">
          <button
            type="submit"
            class="btn btn-lg px-5"
            style="background: #ff2c91; color: white"
          >
            Save Employee
          </button>
          <a
            href="{% url 'employee_list' %}"
            class="btn btn-outline-light btn-lg ms-3"
            >Cancel</a
          >
        </div>
      </div>
    </form>
  </div>
</div>
