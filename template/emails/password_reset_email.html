<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #0c0c18;
      color: #ddd;
      font-family: Arial;
      padding: 30px;
    }
    .wrapper {
      max-width: 600px;
      margin: auto;
      background: #141425;
      border-radius: 16px;
      padding: 35px;
      border: 1px solid #29294b;
      box-shadow: 0 0 15px rgba(255, 20, 147, 0.2);
      color: white;
    }
    h2 {
      color: #ff5db1;
      margin-bottom: 15px;
      font-size: 26px;
    }
    .button {
      background: linear-gradient(90deg, #ff2b9f, #8a2be2);
      color: white;
      padding: 12px 30px;
      border-radius: 40px;
      text-decoration: none;
      display: inline-block;
      margin-top: 25px;
      font-weight: bold;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: white;
    }
  </style>
</head>

<body>

<div class="wrapper">
  <h2>Password Reset Request</h2>

  <p>Hello,</p>
  <p>You requested to reset your <b>SJ.Tech Solution</b> password.</p>
  <p>Click the button below to continue:</p>

  <a class="button" href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}">
    Reset Password
  </a>

  <p style="margin-top: 20px; color: #999;">
    If you didn't request this, simply ignore this email.
  </p>
</div>

</body>
</html>
